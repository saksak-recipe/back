# 개발용
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saksak-back
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["uv", "run", "fastapi", "dev", "src/main.py", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - saksak-network
    env_file:
      - .env
    environment:
      - DB_HOST=saksak-db
      - TZ=Asia/Seoul

  postgresql:
    image: pgvector/pgvector:pg15
    container_name: saksak-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=saksak
      - TZ=Asia/Seoul
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - saksak-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d saksak" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  saksak-network:

volumes:
  postgres_dev_data: